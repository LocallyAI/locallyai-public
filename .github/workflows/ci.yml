name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          # Cache key includes all requirements files so a deps change
          # invalidates the cache automatically.
          cache-dependency-path: |
            requirements-core.txt
            requirements-ml.txt
            requirements.txt

      - name: Install dependencies (core only)
        # CI installs requirements-core.txt — NOT requirements-ml.txt
        # (which pulls PyTorch + sentence-transformers ≈ 1 GB).
        # The smoke test handles missing ml deps gracefully via
        # pytest.skip — see tests/test_smoke.py.
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          pip install -r requirements-core.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Test with pytest
        run: pytest -v
